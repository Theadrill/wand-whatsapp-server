<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W.A.N.D. | WhatsApp Notification Devices</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>W.A.N.D.</h1>
        <h2>WhatsApp Notification Devices</h2>
        <div id="status-badge">Iniciando...</div>
        
        <p id="instruction">Para configurar o dispositivo, escaneie o código abaixo com o seu WhatsApp.</p>
        
        <div id="qr-container">
            <img id="qrcode" src="" alt="WhatsApp QR Code">
        </div>

        <div id="loading-area">
            <div class="loader"></div>
            <span>Aguardando servidor...</span>
        </div>

        <div id="online-msg" class="online-msg">
            ✅ Servidor Conectado e Ativo
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
